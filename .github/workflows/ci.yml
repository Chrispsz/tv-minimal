name: CI - Build & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔍 Run Detekt (Static Analysis)
      run: ./gradlew detekt || true
      continue-on-error: true

    - name: 🧪 Run Unit Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: 📊 Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          app/build/reports/tests/
          app/build/test-results/
        retention-days: 7

    - name: 📊 Upload Detekt Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-reports
        path: app/build/reports/detekt/
        retention-days: 7

    - name: 🏗️ Build Debug APK
      run: ./gradlew assembleDebug

    - name: 📦 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: 📋 Print Test Summary
      if: always()
      run: |
        echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "app/build/reports/tests/testDebugUnitTest/index.html" ]; then
          echo "✅ Tests completed. Download the test-reports artifact for details." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Tests failed or no report generated." >> $GITHUB_STEP_SUMMARY
        fi
