name: Build FongMi TV with Intent Support

on:
  push:
    branches: [ main, release ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout FongMi TV
      uses: actions/checkout@v4
      with:
        repository: FongMi/TV
        ref: release
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Apply Intent Patch
      run: |
        # Copiar AndroidManifest.xml com intent filters
        cp -f fongmi-intent-patch/AndroidManifest.xml app/src/main/AndroidManifest.xml
        
        # Criar diretório e adicionar ExternalPlayActivity
        mkdir -p app/src/main/java/com/fongmi/android/tv/ui/activity/
        cp -f fongmi-intent-patch/ExternalPlayActivity.java app/src/main/java/com/fongmi/android/tv/ui/activity/
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: fongmi-tv-intent-debug
        path: app/build/outputs/apk/debug/*.apk
        
    - name: Build Release APK (unsigned)
      if: github.event_name == 'push' && github.ref == 'refs/heads/release'
      run: ./gradlew assembleRelease
      
    - name: Upload Release APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/release'
      uses: actions/upload-artifact@v4
      with:
        name: fongmi-tv-intent-release
        path: app/build/outputs/apk/release/*.apk
